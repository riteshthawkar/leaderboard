worker_processes 1;
pid /tmp/ms-vista-nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main_no_query '$remote_addr - $remote_user [$time_local] '
        '"$request_method $uri $server_protocol" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main_no_query;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 55m;
    client_body_temp_path /tmp/ms-vista-client-body;
    proxy_temp_path /tmp/ms-vista-proxy;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_for $forwarded_for {
        default $http_x_forwarded_for;
        "" $remote_addr;
    }

    server {
        listen 7860;
        server_name _;
        root /home/user/app/frontend-dist;
        index index.html;

        location = /api {
            proxy_pass http://127.0.0.1:5050;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 200s;
            proxy_send_timeout 200s;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:5050;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 200s;
            proxy_send_timeout 200s;
        }

        location /assets/ {
            try_files $uri =404;
            include /home/user/app/deployment/huggingface/security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
            include /home/user/app/deployment/huggingface/security-headers.conf;
            add_header Cache-Control "no-cache";
        }
    }
}
